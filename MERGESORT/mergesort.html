<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort: Step-by-Step Master</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #f59e0b; 
            --node: #334155;
            --text: #f8fafc;
            --highlight: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .status-panel {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--accent);
            width: 80%;
        }

        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
        }

        .level-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }

        .array-node {
            display: flex;
            background: var(--node);
            padding: 5px;
            border-radius: 4px;
            gap: 4px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .array-node.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        .element {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #475569;
            border-radius: 2px;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
        }

        .element.empty {
            background: #1e293b;
            border: 1px dashed #64748b;
            color: transparent;
        }

        .element.correct { background: var(--highlight); }
        .element:hover:not(.empty) { background: #64748b; }

        .instruction {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }

        #next-lvl-btn {
            display: none;
            padding: 10px 20px;
            background: var(--highlight);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        #reset-btn {
            background: var(--error);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="status-panel">
        <h1 id="lvl-title">Level 1 (4 Elements)</h1>
        <div id="phase-text" class="instruction">Phase: Dividing</div>
        <p id="hint">Click the center of the array to split it.</p>
    </div>

    <div class="tree-container" id="game-board"></div>

    <div style="display: flex; gap: 10px;">
        <button id="reset-btn" onclick="initGame()">Restart Level</button>
        <button id="next-lvl-btn" onclick="nextLevel()">Next Level</button>
    </div>

<script>
    let currentLevel = 1;
    let data = [];
    let step = 0;

    function initGame() {
        step = 0;
        const size = currentLevel === 1 ? 4 : 8;
        document.getElementById('lvl-title').innerText = `Level ${currentLevel} (${size} Elements)`;
        document.getElementById('next-lvl-btn').style.display = 'none';
        data = Array.from({length: size}, () => Math.floor(Math.random() * 50));
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        const phaseText = document.getElementById('phase-text');
        const hint = document.getElementById('hint');

        const rows = { r0: createRow(), r1: createRow(), r2: createRow(), r3: createRow() };

        if (currentLevel === 1) {
            runLevel1(rows, phaseText, hint);
        } else {
            runLevel2(rows, phaseText, hint);
        }

        Object.values(rows).forEach(r => board.appendChild(r));
    }

    function runLevel1(rows, phaseText, hint) {
        if (step === 0) {
            addArray(rows.r0, data, true, (idx) => { if(idx === 1 || idx === 2) { step++; renderBoard(); }});
        } else if (step === 1) {
            addArray(rows.r0, data, false);
            addArray(rows.r1, data.slice(0,2), true, () => { step++; renderBoard(); });
            addArray(rows.r1, data.slice(2,4), false);
        } else if (step === 2) {
            addArray(rows.r0, data, false);
            addArray(rows.r1, data.slice(0,2), false);
            addArray(rows.r1, data.slice(2,4), true, () => { step++; renderBoard(); });
        } else if (step >= 3) {
            phaseText.innerText = "Phase: Merging";
            hint.innerText = "Compare sub-arrays. Pick the smallest available value!";
            
            addArray(rows.r3, [data[0]], step === 3);
            addArray(rows.r3, [data[1]], step === 3);
            addArray(rows.r3, [data[2]], step === 4);
            addArray(rows.r3, [data[3]], step === 4);

            if (step === 3) {
                addArray(rows.r2, ["?", "?"], false);
                validateChoice(rows.r3, data[0], data[1], 0, 1);
            } else if (step === 4) {
                addArray(rows.r2, [data[0], data[1]].sort((a,b)=>a-b), false);
                addArray(rows.r2, ["?", "?"], false);
                validateChoice(rows.r3, data[2], data[3], 2, 3);
            } else {
                addArray(rows.r0, [...data].sort((a,b)=>a-b), false, null, true);
                phaseText.innerText = "Level 1 Complete!";
                document.getElementById('next-lvl-btn').style.display = 'block';
            }
        }
    }

    function runLevel2(rows, phaseText, hint) {
        // Level 2 follows the same strict logic for 8 elements
        if (step < 7) {
            phaseText.innerText = "Phase: Dividing (8 Elements)";
            addArray(rows.r0, data, step === 0, (i) => { if(i >= 3 && i <= 4) step = 1; renderBoard(); });
            if(step >= 1) {
                addArray(rows.r1, data.slice(0,4), step === 1, (i) => { if(i==1||i==2) step = 2; renderBoard(); });
                addArray(rows.r1, data.slice(4,8), step === 2, (i) => { if(i==1||i==2) step = 3; renderBoard(); });
            }
            if(step >= 3) {
                addArray(rows.r2, data.slice(0,2), step === 3, () => { step = 4; renderBoard(); });
                addArray(rows.r2, data.slice(2,4), step === 4, () => { step = 5; renderBoard(); });
                addArray(rows.r2, data.slice(4,6), step === 5, () => { step = 6; renderBoard(); });
                addArray(rows.r2, data.slice(6,8), step === 6, () => { step = 7; renderBoard(); });
            }
        } else {
            phaseText.innerText = "Phase: Merging";
            hint.innerText = "Only the smallest value of the pair will progress!";
            for(let i=0; i<8; i++) addArray(rows.r3, [data[i]], step === 7+Math.floor(i/2));
            
            if (step < 11) {
                let start = (step - 7) * 2;
                validateChoice(rows.r3, data[start], data[start+1], start, start+1);
            } else {
                addArray(rows.r0, [...data].sort((a,b)=>a-b), false, null, true);
                phaseText.innerText = "Master Level Complete!";
            }
        }
    }

    function validateChoice(rowEl, v1, v2, idx1, idx2) {
        const cells = rowEl.querySelectorAll('.element');
        // We only care about the cells currently in 'active' comparison
        [cells[idx1], cells[idx2]].forEach(el => {
            el.onclick = () => {
                const val = parseInt(el.innerText);
                const otherVal = (val === v1) ? v2 : v1;
                
                if (val <= otherVal) {
                    step++;
                    renderBoard();
                } else {
                    alert(`Incorrect! ${val} is larger than ${otherVal}. Merge Sort must pick the smallest first.`);
                }
            };
        });
    }

    function createRow() {
        const div = document.createElement('div');
        div.className = 'level-row';
        return div;
    }

    function addArray(row, items, active, callback, highlight=false) {
        const node = document.createElement('div');
        node.className = `array-node ${active ? 'active' : ''}`;
        items.forEach((item, idx) => {
            const el = document.createElement('div');
            el.className = `element ${item === '?' ? 'empty' : ''} ${highlight ? 'correct' : ''}`;
            el.innerText = item;
            if(active && callback) el.onclick = () => callback(idx);
            node.appendChild(el);
        });
        row.appendChild(node);
    }

    function nextLevel() {
        currentLevel = 2;
        initGame();
    }

    initGame();
</script>
</body>
</html>
