<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort Game</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 700px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--accent);
        }

        .timer-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: width 0.1s linear;
        }

        .array-zone {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .sub-array {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
        }

        .box-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .box {
            width: 45px;
            height: 45px;
            background: var(--accent);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .merge-zone {
            padding: 20px;
            border: 2px solid #334155;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }

        .input-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        input {
            width: 50px;
            height: 50px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { opacity: 0.9; }

        #msg { margin-top: 15px; min-height: 24px; }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="stats">
        <span>LEVEL: <span id="level-val">1</span></span>
        <span>SCORE: <span id="score-val">0</span></span>
    </div>
    
    <div class="timer-bar"><div id="progress"></div></div>

    <h2>The Final Merge</h2>
    <p style="color: #94a3b8;">Combine the sorted arrays into one master list!</p>

    <div class="array-zone">
        <div class="sub-array">
            <small>Left Branch</small>
            <div id="left-box" class="box-wrapper"></div>
        </div>
        <div class="sub-array">
            <small>Right Branch</small>
            <div id="right-box" class="box-wrapper"></div>
        </div>
    </div>

    <div class="merge-zone">
        <div id="input-container" class="input-grid"></div>
        <button onclick="verify()">Submit Sequence</button>
    </div>

    <div id="msg"></div>
</div>

<script>
    let level = 1;
    let score = 0;
    let solution = [];
    let timeLeft = 100;
    let timerInterval;

    function startGame() {
        clearInterval(timerInterval);
        timeLeft = 100;
        const size = 2 + Math.floor(level / 2); // Gets harder every 2 levels
        
        // Generate two sorted arrays
        let left = Array.from({length: size}, () => Math.floor(Math.random() * 50)).sort((a,b) => a-b);
        let right = Array.from({length: size}, () => Math.floor(Math.random() * 50)).sort((a,b) => a-b);
        solution = [...left, ...right].sort((a,b) => a-b);

        // Render
        renderBoxes('left-box', left);
        renderBoxes('right-box', right);
        
        const container = document.getElementById('input-container');
        container.innerHTML = '';
        solution.forEach((_, i) => {
            const input = document.createElement('input');
            input.type = 'number';
            input.id = `in-${i}`;
            // Auto-focus next input
            input.oninput = function() {
                if(this.value && document.getElementById(`in-${i+1}`)) {
                    document.getElementById(`in-${i+1}`).focus();
                }
            };
            container.appendChild(input);
        });

        startTimer();
    }

    function renderBoxes(id, arr) {
        const el = document.getElementById(id);
        el.innerHTML = arr.map(n => `<div class="box">${n}</div>`).join('');
    }

    function startTimer() {
        const bar = document.getElementById('progress');
        const duration = Math.max(10, 30 - level); // Time decreases as level goes up
        let step = 100 / (duration * 10);
        
        timerInterval = setInterval(() => {
            timeLeft -= step;
            bar.style.width = timeLeft + "%";
            if(timeLeft <= 0) {
                gameOver("Time's up! The arrays collapsed.");
            }
        }, 100);
    }

    function verify() {
        let userInputs = [];
        for(let i=0; i<solution.length; i++) {
            userInputs.push(parseInt(document.getElementById(`in-${i}`).value));
        }

        if(JSON.stringify(userInputs) === JSON.stringify(solution)) {
            level++;
            score += 100 * level;
            document.getElementById('level-val').innerText = level;
            document.getElementById('score-val').innerText = score;
            document.getElementById('msg').innerHTML = "<span style='color:var(--success)'>Level Complete! Next phase initiating...</span>";
            setTimeout(startGame, 1500);
        } else {
            document.querySelector('.game-container').classList.add('shake');
            setTimeout(() => document.querySelector('.game-container').classList.remove('shake'), 500);
            document.getElementById('msg').innerHTML = "<span style='color:var(--error)'>Logic Error! Sequence incorrect.</span>";
        }
    }

    function gameOver(reason) {
        clearInterval(timerInterval);
        alert(reason + "\nFinal Score: " + score);
        level = 1;
        score = 0;
        document.getElementById('level-val').innerText = level;
        document.getElementById('score-val').innerText = score;
        startGame();
    }

    startGame();
</script>

</body>
</html>
