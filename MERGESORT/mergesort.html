<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort: Step-by-Step Master</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #58a6ff;
            --success: #238636;
            --error: #da3633;
            --text: #c9d1d9;
            --highlight: #d29922;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            width: 90%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .level-badge {
            background: var(--highlight);
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        #game-canvas {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .array-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap;
        }

        .node {
            display: flex;
            background: #21262d;
            padding: 4px;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .node.active {
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #30363d;
            margin: 2px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .cell.empty { border: 1px dashed #484f58; color: transparent; cursor: default; }
        .cell.picked { background: var(--success); color: white; }
        .cell.target { background: #1f242c; border: 1px solid var(--accent); }

        .btn-next {
            display: none;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #message { margin-top: 15px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <span class="level-badge" id="level-display">Level 1</span>
        <h1>Algorithm Quest: Merge Sort</h1>
        <p id="instruction">Click the smaller number from the child arrays to merge them up!</p>
        <div id="message"></div>
        <button id="next-btn" class="btn-next" onclick="nextLevel()">Advance to Next Level</button>
    </div>

    <div id="game-canvas"></div>

<script>
    let currentLevel = 1;
    let arraySize = 4;
    let mainArray = [];
    let mergeSteps = [];
    let currentStepIndex = 0;

    function initGame() {
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('level-display').innerText = `Level ${currentLevel}`;
        arraySize = Math.pow(2, currentLevel + 1); // 4, 8, 16...
        mainArray = Array.from({length: arraySize}, () => Math.floor(Math.random() * 99) + 1);
        
        generateMergeSteps();
        renderBoard();
    }

    // This creates the logic for the "Compare & Merge" steps
    function generateMergeSteps() {
        mergeSteps = [];
        let tempArr = mainArray.map((val, idx) => ({ val, pos: idx, level: 0 }));
        
        let workingSize = 1;
        while (workingSize < arraySize) {
            for (let i = 0; i < arraySize; i += 2 * workingSize) {
                let left = mainArray.slice(i, i + workingSize).sort((a,b)=>a-b);
                let right = mainArray.slice(i + workingSize, i + 2 * workingSize).sort((a,b)=>a-b);
                let merged = [...left, ...right].sort((a,b)=>a-b);
                
                mergeSteps.push({
                    range: [i, i + 2 * workingSize - 1],
                    left: left,
                    right: right,
                    expected: merged,
                    userInput: [],
                    completed: false
                });
            }
            workingSize *= 2;
        }
        currentStepIndex = 0;
    }

    function renderBoard() {
        const canvas = document.getElementById('game-canvas');
        canvas.innerHTML = '';
        const step = mergeSteps[currentStepIndex];

        // Top Row: The Target (Where we are merging into)
        const targetRow = document.createElement('div');
        targetRow.className = 'array-row';
        const targetNode = document.createElement('div');
        targetNode.className = 'node active';
        
        for(let i=0; i < step.expected.length; i++) {
            const val = step.userInput[i];
            targetNode.innerHTML += `<div class="cell ${val === undefined ? 'empty' : 'picked'}">${val || ''}</div>`;
        }
        targetRow.appendChild(targetNode);
        canvas.appendChild(targetRow);

        // Bottom Row: The Source (The two arrays we compare)
        const sourceRow = document.createElement('div');
        sourceRow.className = 'array-row';

        // Left Sub-array
        const leftNode = document.createElement('div');
        leftNode.className = 'node';
        step.left.forEach((val, idx) => {
            const isUsed = step.userInput.filter(v => v === val).length > step.left.slice(0,idx).filter(v => v === val).length;
            leftNode.innerHTML += `<div class="cell" onclick="handlePick(${val}, 'left')">${val}</div>`;
        });

        // Right Sub-array
        const rightNode = document.createElement('div');
        rightNode.className = 'node';
        step.right.forEach((val, idx) => {
            rightNode.innerHTML += `<div class="cell" onclick="handlePick(${val}, 'right')">${val}</div>`;
        });

        sourceRow.appendChild(leftNode);
        sourceRow.appendChild(rightNode);
        canvas.appendChild(sourceRow);
    }

    function handlePick(value, side) {
        const step = mergeSteps[currentStepIndex];
        const expectedVal = step.expected[step.userInput.length];

        if (value === expectedVal) {
            step.userInput.push(value);
            // Remove from source (visual only logic)
            if(side === 'left') step.left.splice(step.left.indexOf(value), 1);
            else step.right.splice(step.right.indexOf(value), 1);

            document.getElementById('message').innerText = "Correct! Smaller element moved.";
            
            if (step.userInput.length === step.expected.length) {
                step.completed = true;
                currentStepIndex++;
                if (currentStepIndex >= mergeSteps.length) {
                    victory();
                } else {
                    document.getElementById('message').innerText = "Sub-array merged! Moving to next section...";
                    setTimeout(renderBoard, 1000);
                }
            } else {
                renderBoard();
            }
        } else {
            document.getElementById('message').innerText = "Wait! That's not the smallest element. Compare the fronts of both arrays.";
            document.getElementById('message').style.color = "var(--error)";
            setTimeout(() => { document.getElementById('message').style.color = "var(--accent)"; }, 1000);
        }
    }

    function victory() {
        document.getElementById('game-canvas').innerHTML = "<h2>MashaAllah! Array Fully Sorted.</h2>";
        document.getElementById('instruction').innerText = "Complexity O(n log n) achieved!";
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextLevel() {
        currentLevel++;
        initGame();
    }

    initGame();
</script>
</body>
</html>
