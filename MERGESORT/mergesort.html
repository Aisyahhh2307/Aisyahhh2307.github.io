<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort Interactive Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            color: #333;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        .array-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #007bff;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1.2rem;
        }
        .input-area {
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #ccc;
            border-radius: 8px;
        }
        input {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 1.1rem;
            margin: 0 5px;
            border: 2px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background-color: #218838; }
        .feedback { margin-top: 15px; font-weight: bold; }
        .correct { color: #28a745; }
        .wrong { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h1>Merge Sort Challenge</h1>
    <p>Two sorted sub-arrays are being merged. What is the correct order?</p>
    
    <div style="display: flex; justify-content: space-around; width: 100%;">
        <div>
            <small>Left Side</small>
            <div id="left-array" class="array-container"></div>
        </div>
        <div>
            <small>Right Side</small>
            <div id="right-array" class="array-container"></div>
        </div>
    </div>

    <div class="input-area">
        <p>Type the merged sorted array:</p>
        <div id="inputs"></div>
        <br>
        <button onclick="checkAnswer()">Check Answer</button>
    </div>

    <div id="feedback" class="feedback"></div>
    <button style="margin-top:20px; background-color: #6c757d;" onclick="initGame()">New Level</button>
</div>

<script>
    let currentSolution = [];

    function initGame() {
        const left = [Math.floor(Math.random() * 20), Math.floor(Math.random() * 20 + 21)].sort((a,b) => a-b);
        const right = [Math.floor(Math.random() * 20), Math.floor(Math.random() * 20 + 21)].sort((a,b) => a-b);
        
        currentSolution = [...left, ...right].sort((a,b) => a-b);
        
        renderArray('left-array', left);
        renderArray('right-array', right);
        
        const inputContainer = document.getElementById('inputs');
        inputContainer.innerHTML = '';
        currentSolution.forEach((_, i) => {
            inputContainer.innerHTML += `<input type="number" id="ans-${i}" min="0" max="99">`;
        });
        document.getElementById('feedback').innerText = '';
    }

    function renderArray(id, arr) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        arr.forEach(num => {
            el.innerHTML += `<div class="box">${num}</div>`;
        });
    }

    function checkAnswer() {
        let userAns = [];
        for(let i=0; i<currentSolution.length; i++) {
            userAns.push(parseInt(document.getElementById(`ans-${i}`).value));
        }

        const isCorrect = userAns.every((val, index) => val === currentSolution[index]);
        const feedback = document.getElementById('feedback');
        
        if(isCorrect) {
            feedback.innerText = "MashaAllah! Correct! You understand the Merge step.";
            feedback.className = "feedback correct";
        } else {
            feedback.innerText = "Not quite. Remember, compare the smallest numbers of each side first!";
            feedback.className = "feedback wrong";
        }
    }

    // Start the game on load
    initGame();
</script>

</body>
</html>
