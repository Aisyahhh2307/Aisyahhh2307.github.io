<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort: Step-by-Step Master</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #f59e0b; /* Amber for active elements */
            --node: #334155;
            --text: #f8fafc;
            --highlight: #10b981;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .status-panel {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--accent);
            width: 80%;
        }

        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
        }

        .level-row {
            display: flex;
            justify-content: center;
            gap: 50px;
            width: 100%;
        }

        .array-node {
            display: flex;
            background: var(--node);
            padding: 5px;
            border-radius: 4px;
            gap: 4px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .array-node.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        .element {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #475569;
            border-radius: 2px;
            cursor: pointer;
            user-select: none;
        }

        .element.empty {
            background: #1e293b;
            border: 1px dashed #64748b;
            color: transparent;
        }

        .element.correct { background: var(--highlight); }
        .element:hover:not(.empty) { background: #64748b; }

        .instruction {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }

        #reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="status-panel">
        <h1>Merge Sort Simulator</h1>
        <div id="phase-text" class="instruction">Phase: Dividing</div>
        <p id="hint">Click the element that represents the middle to split the array.</p>
    </div>

    <div class="tree-container" id="game-board">
        <!-- Rows will be injected here -->
    </div>

    <button id="reset-btn" onclick="initGame()">Restart Experiment</button>

<script>
    // Logic: We'll simulate a 4-element merge sort for clarity
    let data = [];
    let step = 0; 
    // Steps: 
    // 0: Split [0,1,2,3] -> [0,1] [2,3]
    // 1: Split [0,1] -> [0], [1]
    // 2: Split [2,3] -> [2], [3]
    // 3: Merge [0] & [1] -> [0,1]
    // 4: Merge [2] & [3] -> [2,3]
    // 5: Merge [0,1] & [2,3] -> [0,1,2,3]

    function initGame() {
        data = Array.from({length: 4}, () => Math.floor(Math.random() * 50));
        step = 0;
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        
        // Phase labels and hints
        const phaseText = document.getElementById('phase-text');
        const hint = document.getElementById('hint');

        // Create the rows (Simplified visualization)
        const rows = {
            top: createRow('top'),
            mid: createRow('mid'),
            bot: createRow('bot')
        };

        // Logic based on step
        if (step === 0) {
            phaseText.innerText = "Phase: Dividing (Lvl 1)";
            hint.innerText = "The algorithm finds the mid-point. Click a middle element to split.";
            addArray(rows.top, data, true, (idx) => {
                if(idx === 1 || idx === 2) nextStep();
            });
        } 
        else if (step === 1) {
            phaseText.innerText = "Phase: Dividing (Lvl 2)";
            hint.innerText = "Split the left sub-array into single elements.";
            addArray(rows.top, data, false);
            addArray(rows.mid, data.slice(0,2), true, () => nextStep());
            addArray(rows.mid, data.slice(2,4), false);
        }
        else if (step === 2) {
            phaseText.innerText = "Phase: Dividing (Lvl 2)";
            hint.innerText = "Now split the right sub-array.";
            addArray(rows.top, data, false);
            addArray(rows.mid, data.slice(0,2), false);
            addArray(rows.mid, data.slice(2,4), true, () => nextStep());
        }
        else if (step >= 3) {
            phaseText.innerText = "Phase: Merging (Conquer)";
            hint.innerText = "Compare the smallest available elements. Click the SMALLER one to move it up.";
            
            // Show the single nodes at the bottom
            addArray(rows.bot, [data[0]], step === 3);
            addArray(rows.bot, [data[1]], step === 3);
            addArray(rows.bot, [data[2]], step === 4);
            addArray(rows.bot, [data[3]], step === 4);

            if (step === 3) {
                // Merging first two
                let sortedPair = [data[0], data[1]].sort((a,b)=>a-b);
                addArray(rows.mid, ["?", "?"], false); 
                // To keep it simple, clicking either progresses the logic for this demo
                // In a full game, we'd check if user clicked the smaller of the two bots
                const bots = rows.bot.querySelectorAll('.element');
                bots.forEach(el => el.onclick = () => {
                    const val = parseInt(el.innerText);
                    const otherVal = parseInt(data[0] === val ? data[1] : data[0]);
                    if (val <= otherVal) nextStep();
                    else alert("Wrong! In Merge Sort, we always pick the smaller element first.");
                });
            }
            else if (step === 4) {
                let leftPair = [data[0], data[1]].sort((a,b)=>a-b);
                addArray(rows.mid, leftPair, false);
                addArray(rows.mid, ["?", "?"], false);
                const bots = rows.bot.querySelectorAll('.element');
                // Target elements 2 and 3
                [bots[2], bots[3]].forEach(el => el.onclick = () => nextStep());
            }
            else {
                phaseText.innerText = "CONGRATULATIONS!";
                hint.innerText = "You have successfully completed the Merge Sort recursion!";
                addArray(rows.top, data.slice().sort((a,b)=>a-b), false, null, true);
            }
        }

        Object.values(rows).forEach(r => board.appendChild(r));
    }

    function createRow(className) {
        const div = document.createElement('div');
        div.className = 'level-row ' + className;
        return div;
    }

    function addArray(row, items, active, callback, highlight=false) {
        const node = document.createElement('div');
        node.className = `array-node ${active ? 'active' : ''}`;
        items.forEach((item, idx) => {
            const el = document.createElement('div');
            el.className = `element ${item === '?' ? 'empty' : ''} ${highlight ? 'correct' : ''}`;
            el.innerText = item;
            if(active && callback) el.onclick = () => callback(idx);
            node.appendChild(el);
        });
        row.appendChild(node);
    }

    function nextStep() {
        step++;
        renderBoard();
    }

    initGame();
</script>
</body>
</html>
