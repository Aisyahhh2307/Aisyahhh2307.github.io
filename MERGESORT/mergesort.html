<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Sort: Interactive Tree</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #f59e0b; 
            --node: #334155;
            --text: #f8fafc;
            --highlight: #10b981;
            --compare: #38bdf8;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .status-panel {
            text-align: center;
            margin: 20px;
            padding: 20px;
            background: var(--card);
            border-radius: 12px;
            border: 2px solid var(--accent);
            width: 80%;
        }

        .board {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            margin-top: 20px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }

        .node {
            display: flex;
            background: var(--node);
            padding: 6px;
            border-radius: 6px;
            gap: 4px;
            border: 2px solid transparent;
        }

        .node.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(245,158,11,0.3); }

        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #475569;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .cell.empty { background: #1e293b; border: 1px dashed #64748b; color: transparent; cursor: default; }
        .cell.comparing { background: var(--compare); color: var(--bg); transform: scale(1.1); }
        .cell.sorted { background: var(--highlight); }

        .instruction { color: var(--accent); font-size: 1.3rem; margin-bottom: 10px; }
        
        #next-btn {
            display: none;
            padding: 15px 30px;
            background: var(--highlight);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="status-panel">
        <h2 id="lvl-txt">Level 1: 4 Elements</h2>
        <div id="phase-txt" class="instruction">Phase: Divide</div>
        <p id="hint-txt">Click the middle elements of the active array to split it.</p>
    </div>

    <div class="board" id="board"></div>

    <button id="next-btn" onclick="nextLevel()">Next Level (Complexity Increases)</button>

<script>
    let level = 1;
    let size = 4;
    let data = [];
    let state = "DIVIDE"; // DIVIDE -> MERGE
    let splitCount = 0;
    let mergeResults = []; // To track the user's manual merge progress

    function init() {
        size = Math.pow(2, level + 1);
        data = Array.from({length: size}, () => Math.floor(Math.random() * 99) + 1);
        splitCount = 0;
        state = "DIVIDE";
        mergeResults = [];
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('lvl-txt').innerText = `Level ${level}: ${size} Elements`;
        render();
    }

    function render() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const phaseTxt = document.getElementById('phase-txt');
        const hintTxt = document.getElementById('hint-txt');

        if (state === "DIVIDE") {
            phaseTxt.innerText = "Phase: Divide (Splitting)";
            hintTxt.innerText = "Target the center to split arrays into sub-problems.";
            renderDivide(board);
        } else {
            phaseTxt.innerText = "Phase: Merge (Conquering)";
            hintTxt.innerText = "Click the SMALLER number to merge it into the sorted array above.";
            renderMerge(board);
        }
    }

    function renderDivide(container) {
        // Simple 2-level representation for the Divide phase
        const topRow = createRow();
        const bottomRow = createRow();

        // Top Node
        const topNode = createNode(data, splitCount === 0);
        if (splitCount === 0) {
            topNode.onclick = () => { splitCount = 1; render(); };
        }
        topRow.appendChild(topNode);

        // Sub Nodes
        if (splitCount >= 1) {
            const left = data.slice(0, size/2);
            const right = data.slice(size/2);
            
            const leftNode = createNode(left, splitCount === 1);
            const rightNode = createNode(right, splitCount === 2);

            if (splitCount === 1) leftNode.onclick = () => { splitCount = 2; render(); };
            if (splitCount === 2) rightNode.onclick = () => { 
                state = "MERGE"; 
                // Initialize empty merge result slots
                mergeResults = Array(size).fill(null);
                render(); 
            };

            bottomRow.appendChild(leftNode);
            bottomRow.appendChild(rightNode);
        }

        container.appendChild(topRow);
        container.appendChild(bottomRow);
    }

    function renderMerge(container) {
        const topRow = createRow();
        const botRow = createRow();

        // The Result Array (Empty slots to fill)
        const resNode = document.createElement('div');
        resNode.className = "node active";
        mergeResults.forEach(val => {
            const c = document.createElement('div');
            c.className = `cell ${val === null ? 'empty' : 'sorted'}`;
            c.innerText = val || '';
            resNode.appendChild(c);
        });
        topRow.appendChild(resNode);

        // The source arrays (Split)
        const leftArr = data.slice(0, size/2).sort((a,b)=>a-b);
        const rightArr = data.slice(size/2).sort((a,b)=>a-b);

        const leftNode = createNode(leftArr);
        const rightNode = createNode(rightArr);

        // Highlight the current fronts for comparison
        // (Simplified logic: always looks at first element of sorted sub-arrays)
        // Note: In a real recursive game, we'd remove elements as we pick them
        const pick = (val, node) => {
            const sortedFinal = [...data].sort((a,b)=>a-b);
            const nextExpected = sortedFinal[mergeResults.filter(x => x !== null).length];

            if (val === nextExpected) {
                const idx = mergeResults.indexOf(null);
                mergeResults[idx] = val;
                if (mergeResults.every(x => x !== null)) {
                    document.getElementById('next-btn').style.display = 'block';
                }
                render();
            } else {
                alert("Wrong! Compare the fronts. Pick the smallest!");
            }
        };

        leftNode.querySelectorAll('.cell').forEach(c => {
            c.onclick = () => pick(parseInt(c.innerText), leftNode);
        });
        rightNode.querySelectorAll('.cell').forEach(c => {
            c.onclick = () => pick(parseInt(c.innerText), rightNode);
        });

        botRow.appendChild(leftNode);
        botRow.appendChild(rightNode);
        container.appendChild(topRow);
        container.appendChild(botRow);
    }

    function createRow() {
        const r = document.createElement('div');
        r.className = 'row';
        return r;
    }

    function createNode(arr, isActive = false) {
        const n = document.createElement('div');
        n.className = `node ${isActive ? 'active' : ''}`;
        arr.forEach(v => {
            const c = document.createElement('div');
            c.className = 'cell';
            c.innerText = v;
            n.appendChild(c);
        });
        return n;
    }

    function nextLevel() {
        level++;
        init();
    }

    init();
</script>
</body>
</html>
