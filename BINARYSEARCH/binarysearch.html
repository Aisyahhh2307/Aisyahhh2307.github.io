<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Search Interactive Quiz ft. Gemini</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        .array-container { display: flex; gap: 8px; margin: 20px 0; justify-content: center; flex-wrap: wrap; }
        .box { width: 45px; height: 45px; border: 2px solid #cbd5e1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; transition: all 0.3s; font-size: 0.9rem; }
        .idx-label { font-size: 0.6rem; color: #64748b; margin-bottom: 2px; }
        .active { background: #dbeafe; border-color: var(--primary); transform: scale(1.1); }
        .target-found { background: #22c55e; color: white; border-color: #16a34a; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .feedback { margin: 15px 0; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>Binary Search Challenge</h2>
    <p>Target Value: <strong id="targetDisplay" style="color: #2563eb; font-size: 1.2rem;">?</strong></p>
    <div class="array-container" id="arrayVisual"></div>
    
    <p id="question">Loading...</p>
    <input type="number" id="answerInput" placeholder="Enter middle index...">
    <button class="btn" onclick="checkAnswer()">Submit Answer</button>
    <p class="feedback" id="feedback"></p>
    <button class="btn" id="resetBtn" style="background:#64748b; display:none;" onclick="initGame()">Generate New Array</button>
</div>

<script>
    let array = [];
    let target = 0;
    let low = 0;
    let high = 8;
    let currentMid = 0;

    function initGame() {
        // 1. Generate 9 random unique numbers and sort them
        let nums = new Set();
        while(nums.size < 9) nums.add(Math.floor(Math.random() * 90) + 10);
        array = Array.from(nums).sort((a, b) => a - b);
        
        // 2. Pick a random number from the array as the target
        target = array[Math.floor(Math.random() * array.length)];
        
        // 3. Reset variables
        low = 0;
        high = array.length - 1;
        
        // 4. Update UI
        document.getElementById('targetDisplay').innerText = target;
        document.getElementById('resetBtn').style.display = "none";
        document.getElementById('feedback').innerText = "";
        document.getElementById('answerInput').value = "";
        renderArray();
        updateQuestion();
    }

    function renderArray() {
        const container = document.getElementById('arrayVisual');
        container.innerHTML = array.map((val, i) => `
            <div class="box" id="box-${i}">
                <span class="idx-label">idx ${i}</span>
                <strong>${val}</strong>
            </div>
        `).join('');
    }

    function updateQuestion() {
        document.getElementById('question').innerHTML = 
            `Range: [Index ${low} to ${high}]. <br> What is the <strong>middle index</strong>?`;
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('answerInput').value);
        const expectedMid = Math.floor((low + high) / 2);
        const feedback = document.getElementById('feedback');

        if (userAns === expectedMid) {
            const midVal = array[userAns];
            document.getElementById(`box-${userAns}`).classList.add('active');

            if (midVal === target) {
                document.getElementById(`box-${userAns}`).className = 'box target-found';
                feedback.innerHTML = `🎉 Correct! Index ${userAns} is the target!`;
                feedback.style.color = "#16a34a";
                document.getElementById('resetBtn').style.display = "block";
            } else if (midVal < target) {
                feedback.innerHTML = `✅ Correct! ${midVal} < ${target}, so we search the <b>RIGHT</b> half.`;
                feedback.style.color = "#2563eb";
                low = userAns + 1;
                updateQuestion();
            } else {
                feedback.innerHTML = `✅ Correct! ${midVal} > ${target}, so we search the <b>LEFT</b> half.`;
                feedback.style.color = "#2563eb";
                high = userAns - 1;
                updateQuestion();
            }
        } else {
            feedback.innerHTML = `❌ Incorrect. Try again! Formula: floor((${low} + ${high}) / 2)`;
            feedback.style.color = "#dc2626";
        }
        document.getElementById('answerInput').value = "";
    }

    initGame();
</script>

</body>
</html>
