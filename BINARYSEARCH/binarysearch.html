<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Number: The Binary Challenge</title>
    <style>
        :root {
            --primary: #1e3a8a; /* Deep blue */
            --bg: #0f172a; /* Dark background */
            --text: #f1f5f9;
            --accent: #f59e0b; /* Amber accent */
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        .game-card { background: #1e293b; padding: 3rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); max-width: 500px; width: 100%; text-align: center; border: 1px solid #334155; }
        
        h1 { color: var(--accent); margin-top: 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .sub-header { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; }
        
        .stat-box { display: flex; justify-content: space-between; background: #0f172a; padding: 15px 25px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 25px; }
        
        .stat-label { color: #94a3b8; font-weight: 500; text-transform: uppercase; font-size: 0.85rem; }
        
        .stat-value { font-size: 1.8rem; font-weight: bold; color: white; }
        
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: white; font-size: 1.2rem; box-sizing: border-box; text-align: center; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--accent); }
        
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        
        .btn { border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase; transition: opacity 0.2s; flex: 1; }
        
        .btn-submit { background: var(--accent); color: #0f172a; }
        .btn-submit:disabled { background: #64748b; cursor: not-allowed; }
        
        .btn-refresh { background: #475569; color: white; }
        
        .btn:hover { opacity: 0.9; }
        
        .feedback { margin-top: 25px; font-weight: 500; min-height: 28px; font-size: 1.1rem; }
        .too-low { color: #60a5fa; } /* Sky blue */
        .too-high { color: #f87171; } /* Red */
        .correct { color: #4ade80; font-size: 1.3rem; font-weight: bold; } /* Green */
        .game-over { color: #f87171; font-size: 1.3rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>Hidden Number</h1>
    <p class="sub-header">I'm thinking of a number between 1 and 1,000,000.</p>
    
    <div class="stat-box">
        <div>
            <div class="stat-label">Guesses Left</div>
            <div class="stat-value" id="movesCount">20</div>
        </div>
        <div>
            <div class="stat-label">Min | Max Range</div>
            <div class="stat-value" id="rangeDisplay" style="font-size: 1rem; color: #94a3b8; font-weight: normal; padding-top:10px;">1 — 1,000,000</div>
        </div>
    </div>
    
    <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="1000000">
    
    <div class="btn-container">
        <button class="btn btn-submit" id="submitBtn" onclick="processGuess()">Submit Guess</button>
        <button class="btn btn-refresh" onclick="startGame()">Refresh</button>
    </div>
    
    <p class="feedback" id="feedback"></p>
</div>

<script>
    const MAX_MOVES = 20;
    const MAX_NUMBER = 1000000;
    let targetNumber;
    let movesLeft;
    let currentMin;
    let currentMax;
    let gameOver = false;

    // Elements
    const guessInput = document.getElementById('guessInput');
    const movesCount = document.getElementById('movesCount');
    const rangeDisplay = document.getElementById('rangeDisplay');
    const feedback = document.getElementById('feedback');
    const submitBtn = document.getElementById('submitBtn');

    function startGame() {
        // Reset state
        targetNumber = Math.floor(Math.random() * MAX_NUMBER) + 1;
        movesLeft = MAX_MOVES;
        currentMin = 1;
        currentMax = MAX_NUMBER;
        gameOver = false;

        // Reset UI
        movesCount.innerText = movesLeft;
        movesCount.style.color = "white"; // Reset color
        rangeDisplay.innerText = `${currentMin.toLocaleString()} — ${currentMax.toLocaleString()}`;
        feedback.innerText = "Good luck! Make your first guess.";
        feedback.className = "feedback"; // Reset classes
        guessInput.value = "";
        guessInput.disabled = false;
        submitBtn.disabled = false;
        guessInput.focus();
    }

    function processGuess() {
        if (gameOver) return;

        let userGuess = parseInt(guessInput.value);

        // Validation
        if (isNaN(userGuess) || userGuess < 1 || userGuess > MAX_NUMBER) {
            feedback.innerText = `Invalid guess. Please enter a number between 1 and ${MAX_NUMBER.toLocaleString()}.`;
            feedback.className = "feedback too-high"; // Using too-high style for error
            return;
        }

        movesLeft--;
        movesCount.innerText = movesLeft;
        guessInput.value = ""; // Clear input for next guess
        
        // Change color as guesses run low
        if (movesLeft <= 5) {
            movesCount.style.color = "#f87171"; // Red
        } else if (movesLeft <= 10) {
            movesCount.style.color = "#f59e0b"; // Amber
        }

        // Core logic
        if (userGuess === targetNumber) {
            endGame(true);
        } else {
            if (movesLeft <= 0) {
                endGame(false);
            } else {
                if (userGuess < targetNumber) {
                    currentMin = Math.max(currentMin, userGuess + 1);
                    feedback.innerText = `🥶 TOO LOW! The number is higher than ${userGuess}.`;
                    feedback.className = "feedback too-low";
                } else {
                    currentMax = Math.min(currentMax, userGuess - 1);
                    feedback.innerText = `🥵 TOO HIGH! The number is lower than ${userGuess}.`;
                    feedback.className = "feedback too-high";
                }
                updateRange();
            }
        }
    }

    function updateRange() {
        rangeDisplay.innerText = `${currentMin.toLocaleString()} — ${currentMax.toLocaleString()}`;
    }

    function endGame(win) {
        gameOver = true;
        guessInput.disabled = true;
        submitBtn.disabled = true;
        rangeDisplay.innerText = "—"; // Range is irrelevant now

        if (win) {
            feedback.innerHTML = `🎉 CORRECT! The hidden number was <strong>${targetNumber.toLocaleString()}</strong>. You had ${movesLeft} guesses left!`;
            feedback.className = "feedback correct";
        } else {
            feedback.innerHTML = `💥 GAME OVER! You ran out of guesses. The correct number was <strong>${targetNumber.toLocaleString()}</strong>.`;
            feedback.className = "feedback game-over";
        }
    }

    // Allow submitting with "Enter" key
    guessInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            processGuess();
        }
    });

    // Start game on load
    startGame();
</script>

</body>
</html>
